; KVM Switcher controller — Seeed Studio Xiao ESP32-S3
;
; Role: USB host for the keyboard (native ESP32-S3 USB OTG, no MAX3421E).
;       Filters the configured hotkey, forwards everything else to the
;       Xiao RP2350 (kvm-switcher-hid) over a UART link. Also runs WiFi,
;       Web UI, MQTT and DDC/CI monitor switching.
;
; USB-OTG is in HOST mode, so USB-CDC Serial is unavailable. Debug logs
; are tunnelled over the UART link to the RP2350, which exposes them as
; a USB-CDC interface to the PC.
;
; Power: VBUS comes from the RP2350's 5V pin (RP2350 is plugged into PC).

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_port=COM6
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv     ; two 3.3MB OTA slots + 1.4MB SPIFFS
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit NeoPixel@^1.12.0
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    ayushsharma82/ElegantOTA@^3.1.0
    https://github.com/esp32beans/ESP32_USB_Host_HID.git
build_flags =
    -DARDUINO_USB_MODE=0           ; USB-OTG in HOST mode (keyboard plugs into Xiao USB-C via OTG adapter)
    -DARDUINO_USB_CDC_ON_BOOT=0    ; no USB-CDC Serial (host mode); logs tunnel via UART link
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
