; KVM HID bridge — Seeed Studio Xiao RP2350
;
; Role: USB device to the host PC. Presents a composite USB device:
;         - HID boot keyboard
;         - HID consumer-control (volume, media)
;         - USB-CDC serial (debug log surface for both boards)
;       Receives framed messages from the kvm-switcher-control (Xiao
;       ESP32-S3) over UART0 at 1 Mbps.
;
; Power: PC USB-C provides 5V; the VBUS/5V pin feeds the ESP32-S3.
;
; Toolchain: arduino-pico (earlephilhower) — RP2350 + Adafruit TinyUSB.

[env:xiao_rp2350]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = seeed_xiao_rp2350
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200

; TinyUSB stack with composite HID + CDC. arduino-pico exposes HID via
; "Adafruit TinyUSB Library"; we configure interfaces in code.
build_flags =
    -DUSE_TINYUSB
    -DCFG_TUD_HID=2          ; two HID interfaces: keyboard + consumer
    -DCFG_TUD_CDC=1
    -DCFG_TUD_VENDOR=0

lib_deps =
    adafruit/Adafruit TinyUSB Library@^3.3.4

; Use Adafruit TinyUSB stack for the USB device (instead of the built-in
; PicoSDK CDC). This must come AFTER the lib_deps above.
board_build.usb_manufacturer = "DIY KVM"
board_build.usb_product      = "KVM HID Bridge"
